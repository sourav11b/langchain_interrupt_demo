# ─────────────────────────────────────────────────────────────────────────────
#  VaultIQ — service configuration
#  Derived service map for the FSI fraud-detection demo.
#  Secrets / endpoints live in .env. Names / shapes / wiring live here.
# ─────────────────────────────────────────────────────────────────────────────

[app]
name        = VaultIQ
env         = ${APP_ENV:demo}
log_level   = ${LOG_LEVEL:INFO}

# ── MongoDB Atlas ────────────────────────────────────────────────────────────
[mongodb]
uri                 = ${MONGODB_URI}
database            = langchain_interrupt_demo
# Atlas Admin API (cluster mgmt, search-index creation)
atlas_client_id     = ${ATLAS_API_CLIENT_ID}
atlas_client_secret = ${ATLAS_API_CLIENT_SECRET}
atlas_project_id    = ${ATLAS_API_PROJECT_ID}
atlas_cluster_name  = ${ATLAS_API_CLUSTER_NAME}

# ── Collections (PolyStorage) ────────────────────────────────────────────────
# Structured
[mongodb.collections.structured]
customers   = customers
accounts    = accounts
devices     = devices
merchants   = merchants
cards       = cards

# Time-series
[mongodb.collections.timeseries]
transactions   = transactions      # tx stream — ts, customer_id metaField
agent_metrics  = agent_metrics     # per-step latency / token counts

# Geo (2dsphere indexed)
[mongodb.collections.geo]
home_locations    = customer_geo
merchant_geo      = merchant_geo
transaction_geo   = transaction_geo  # last-known tx point cache

# Graph (used with $graphLookup)
[mongodb.collections.graph]
relationships = entity_edges       # (from, to, type, weight) edges

# Unstructured / vector
[mongodb.collections.vector]
fraud_kb     = fraud_kb            # policy + scenario corpus, vectorised
case_notes   = case_notes          # investigator notes, vectorised
sem_memory   = agent_semantic_mem  # long-term agent semantic memory

# Cases / CRM
[mongodb.collections.crm]
cases        = cases
case_events  = case_events

# LangGraph state
[mongodb.collections.langgraph]
checkpoints       = lg_checkpoints
checkpoint_writes = lg_checkpoint_writes
store             = lg_store
chat_history      = chat_history

# Caching
[mongodb.collections.cache]
semantic_cache = llm_semantic_cache
llm_cache      = llm_cache

# ── Vector / Search index names ──────────────────────────────────────────────
[mongodb.indexes]
vector_fraud_kb   = fraud_kb_vector_idx
vector_case_notes = case_notes_vector_idx
vector_sem_mem    = sem_mem_vector_idx
fts_fraud_kb      = fraud_kb_fts_idx
fts_case_notes    = case_notes_fts_idx

# ── Models ───────────────────────────────────────────────────────────────────
[llm]
provider                = azure_openai
azure_endpoint          = ${AZURE_OPENAI_ENDPOINT}
azure_api_key           = ${AZURE_OPENAI_API_KEY}
azure_api_version       = ${AZURE_OPENAI_API_VERSION}
azure_deployment        = ${AZURE_OPENAI_DEPLOYMENT_NAME}
temperature             = 0.1
max_tokens              = 1024

[embeddings]
# Vectors are generated server-side by Atlas via langchain_mongodb.AutoEmbeddings.
# The Voyage API key lives inside Atlas (registered with the project for
# autoEmbed) and is never sent from the client.
# Supported autoEmbed models on this Atlas project: voyage-4, voyage-4-large,
# voyage-4-lite, voyage-code-3.  (voyage-finance-2 / voyage-3.x are not
# accepted by mongot autoEmbed — index creation will fail.)
voyage_model            = voyage-4

# ── Semantic cache ──────────────────────────────────────────────────────────
[semantic_cache]
enabled         = true
score_threshold = 0.92

# ── Long-term semantic memory ───────────────────────────────────────────────
[semantic_memory]
enabled         = true
write_on_finish = true
top_k           = 4

# ── LangSmith ───────────────────────────────────────────────────────────────
[observability]
tracing_v2  = ${LANGCHAIN_TRACING_V2:true}
endpoint    = ${LANGCHAIN_ENDPOINT}
api_key     = ${LANGCHAIN_API_KEY}
project     = ${LANGCHAIN_PROJECT:langchain_interrupt_demo}

# ── MongoDB MCP server ──────────────────────────────────────────────────────
[mcp.mongodb]
transport   = ${MONGODB_MCP_TRANSPORT:embedded}
host        = ${MONGODB_MCP_HOST:localhost}
port        = ${MONGODB_MCP_PORT:3001}
read_only   = ${MONGODB_MCP_READ_ONLY:true}
# Disable the Atlas-management toolset for the agent (unsafe in demo).
disabled_tools = atlas

# ── Custom FastMCP server ───────────────────────────────────────────────────
[mcp.vaultiq]
host = ${MCP_SERVER_HOST:localhost}
port = ${MCP_SERVER_PORT:8100}

# ── Agents ──────────────────────────────────────────────────────────────────
[agents.fraud_sentinel]
name              = Fraud Sentinel Agent
score_threshold   = 0.65
auto_block_above  = 0.90
recall_top_k      = 5

[agents.customer_trust]
name              = Customer Trust Agent
verification_min  = 2          # how many KYC factors must match
otp_required_above= 0.5

[agents.case_resolution]
name              = Case Resolution Agent
auto_open_above   = 0.65

# ── Demo / scenario stream ──────────────────────────────────────────────────
[stream]
tx_per_second   = 1
fraud_ratio     = 0.05         # baseline noise; injected scenarios add bursts
seed            = 42
